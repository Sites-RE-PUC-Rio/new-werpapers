name: Publicar vista previa

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v6

      - name: Generar sitio estático
        run: python3 generator/build.py

      - name: Validar sitio
        run: python3 generator/validate.py

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Preparar sitio para GitHub Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publicar sitio
        id: deployment
        uses: actions/deploy-pages@v4

